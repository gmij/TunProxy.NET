<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TunProxy</title>
  <link rel="stylesheet" href="/bootstrap/bootstrap.min.css" />
  <link rel="icon" href="/favicon.png" />
</head>
<body data-page-title-key="Page.Config.Title">
<script src="/i18n.js"></script>
<script src="/nav.js"></script>

<div class="container-fluid px-4">
  <div id="alert-restart" class="alert alert-warning" style="display:none"></div>
  <div id="alert-error" class="alert alert-danger" style="display:none"></div>

  <h4 class="mb-3" data-i18n="Page.Config.Title"></h4>
  <div class="mb-4">
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="text-muted small" data-i18n="Page.Config.CurrentMode"></span>
      <span id="mode-badge" class="badge bg-secondary" data-i18n="Shared.Loading"></span>
    </div>
    <div id="mode-hint-proxy" class="alert alert-info py-2 small mb-2" style="display:none" data-i18n-html="Page.Config.ModeHintProxyHtml"></div>
    <div id="mode-hint-tun" class="alert alert-warning py-2 small mb-2" style="display:none" data-i18n-html="Page.Config.ModeHintTunHtml"></div>
    <div id="local-port-row" class="row g-2 mb-2" style="display:none">
      <div class="col-4 col-md-2">
        <label class="form-label small text-muted" for="localPort" data-i18n="Page.Config.LocalProxyPort"></label>
        <input type="number" class="form-control form-control-sm" id="localPort" value="8080" />
      </div>
      <div class="col-auto d-flex align-items-end">
        <div class="form-check mb-0">
          <input type="checkbox" class="form-check-input" id="setSystemProxy" checked />
          <label class="form-check-label small" for="setSystemProxy" data-i18n="Page.Config.SetSystemProxy"></label>
        </div>
      </div>
    </div>
  </div>

  <h4 class="mb-3" data-i18n="Page.Config.ProxyServer"></h4>
  <div class="mb-4">
    <div class="row g-2 mb-2">
      <div class="col-8 col-md-5">
        <label class="form-label small text-muted" for="proxyHost" data-i18n="Page.Config.ProxyHost"></label>
        <input type="text" class="form-control form-control-sm" id="proxyHost" placeholder="127.0.0.1" />
      </div>
      <div class="col-4 col-md-2">
        <label class="form-label small text-muted" for="proxyPort" data-i18n="Page.Config.ProxyPort"></label>
        <input type="number" class="form-control form-control-sm" id="proxyPort" placeholder="7890" />
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label small text-muted" for="proxyType" data-i18n="Page.Config.ProxyType"></label>
        <select class="form-select form-select-sm" id="proxyType">
          <option value="Socks5">SOCKS5</option>
          <option value="Http">HTTP</option>
        </select>
      </div>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted" for="proxyUsername" data-i18n="Page.Config.ProxyUsername"></label>
        <input type="text" class="form-control form-control-sm" id="proxyUsername" />
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted" for="proxyPassword" data-i18n="Page.Config.ProxyPassword"></label>
        <input type="password" class="form-control form-control-sm" id="proxyPassword" />
      </div>
    </div>
  </div>

  <h4 class="mb-3" data-i18n="Page.Config.RoutingRules"></h4>
  <div class="mb-4">
    <div class="row g-2 mb-2">
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted" for="routeMode" data-i18n="Page.Config.RouteMode"></label>
        <select class="form-select form-select-sm" id="routeMode">
          <option value="global" data-i18n="Page.Config.Route.Global"></option>
          <option value="whitelist" data-i18n="Page.Config.Route.Whitelist"></option>
          <option value="blacklist" data-i18n="Page.Config.Route.Blacklist"></option>
        </select>
      </div>
    </div>
    <div class="mb-2">
      <label class="form-label small text-muted" for="proxyDomains" data-i18n="Page.Config.ProxyDomains"></label>
      <textarea class="form-control form-control-sm font-monospace" id="proxyDomains" rows="5"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label small text-muted" for="directDomains" data-i18n="Page.Config.DirectDomains"></label>
      <textarea class="form-control form-control-sm font-monospace" id="directDomains" rows="3"></textarea>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="enableGeo" />
      <label class="form-check-label small" for="enableGeo" data-i18n="Page.Config.EnableGeo"></label>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="enableGfw" />
      <label class="form-check-label small" for="enableGfw" data-i18n="Page.Config.EnableGfw"></label>
    </div>
  </div>

  <button class="btn btn-primary" id="save-button" data-i18n="Page.Config.Save"></button>
  <p class="text-muted small mt-3" data-i18n-html="Page.Config.ConfigPath"></p>

  <hr class="my-4" />

  <h4 class="mb-2" data-i18n="Page.Config.PacHeading"></h4>
  <p class="text-muted small mb-3" data-i18n-html="Page.Config.PacDescriptionHtml"></p>
  <div class="mb-3 d-flex flex-wrap align-items-center gap-2">
    <code id="pac-url" class="bg-light border rounded px-2 py-1 small">http://127.0.0.1:50000/proxy.pac</code>
    <button class="btn btn-sm btn-outline-secondary" id="copy-pac-button" data-i18n="Page.Config.CopyAddress"></button>
    <a class="btn btn-sm btn-outline-primary" href="/proxy.pac" target="_blank" data-i18n="Page.Config.PreviewPac"></a>
  </div>
  <div id="pac-win-controls" class="d-flex gap-2 flex-wrap">
    <button class="btn btn-sm btn-success" id="apply-pac-button" data-i18n="Page.Config.ApplyPac"></button>
    <button class="btn btn-sm btn-outline-danger" id="clear-pac-button" data-i18n="Page.Config.ClearPac"></button>
    <span id="pac-result" class="small align-self-center text-muted"></span>
  </div>
</div>

<script>
var cfg = {};
var latestMode = null;

function showError(message) {
  var error = document.getElementById('alert-error');
  error.textContent = message;
  error.style.display = '';
}

function hideError() {
  document.getElementById('alert-error').style.display = 'none';
}

function splitLines(text) {
  return text.split('\n').map(function (line) {
    return line.trim();
  }).filter(function (line) {
    return line.length > 0;
  });
}

function renderMode(status) {
  latestMode = status.mode;
  var isTun = status.mode === 'tun';
  var badge = document.getElementById('mode-badge');

  badge.textContent = isTun
    ? window.TunProxyI18n.t('Mode.Tun')
    : window.TunProxyI18n.t('Mode.Proxy');
  badge.className = isTun ? 'badge bg-warning text-dark' : 'badge bg-info text-dark';

  document.getElementById('mode-hint-tun').style.display = isTun ? '' : 'none';
  document.getElementById('mode-hint-proxy').style.display = isTun ? 'none' : '';
  document.getElementById('local-port-row').style.display = isTun ? 'none' : '';
}

function loadMode() {
  return fetch('/api/status')
    .then(function (response) { return response.json(); })
    .then(renderMode)
    .catch(function () {
      document.getElementById('mode-badge').textContent = window.TunProxyI18n.t('Page.Config.ModeUnknown');
    });
}

function loadConfig() {
  return fetch('/api/config')
    .then(function (response) { return response.json(); })
    .then(function (config) {
      cfg = config;
      document.getElementById('localPort').value = config.localProxy.listenPort;
      document.getElementById('setSystemProxy').checked = config.localProxy.setSystemProxy;
      document.getElementById('proxyHost').value = config.proxy.host;
      document.getElementById('proxyPort').value = config.proxy.port;
      document.getElementById('proxyType').value = config.proxy.type;
      document.getElementById('proxyUsername').value = config.proxy.username || '';
      document.getElementById('proxyPassword').value = config.proxy.password || '';
      document.getElementById('routeMode').value = config.route.mode;
      document.getElementById('proxyDomains').value = (config.route.proxyDomains || []).join('\n');
      document.getElementById('directDomains').value = (config.route.directDomains || []).join('\n');
      document.getElementById('enableGeo').checked = config.route.enableGeo;
      document.getElementById('enableGfw').checked = config.route.enableGfwList;
    });
}

function showRestartCountdown() {
  var alert = document.getElementById('alert-restart');
  var remaining = 5;

  function render() {
    alert.textContent = window.TunProxyI18n.format('Page.Config.AlertRestarting', remaining);
    alert.style.display = '';
  }

  render();
  var timer = window.setInterval(function () {
    remaining -= 1;
    if (remaining <= 0) {
      window.clearInterval(timer);
      window.location.reload();
      return;
    }

    render();
  }, 1000);
}

function saveConfig() {
  hideError();

  var payload = JSON.parse(JSON.stringify(cfg));
  payload.localProxy.listenPort = parseInt(document.getElementById('localPort').value, 10) || 8080;
  payload.localProxy.setSystemProxy = document.getElementById('setSystemProxy').checked;
  payload.proxy.host = document.getElementById('proxyHost').value.trim();
  payload.proxy.port = parseInt(document.getElementById('proxyPort').value, 10) || 7890;
  payload.proxy.type = document.getElementById('proxyType').value;
  payload.proxy.username = document.getElementById('proxyUsername').value.trim() || null;
  payload.proxy.password = document.getElementById('proxyPassword').value || null;
  payload.route.mode = document.getElementById('routeMode').value;
  payload.route.proxyDomains = splitLines(document.getElementById('proxyDomains').value);
  payload.route.directDomains = splitLines(document.getElementById('directDomains').value);
  payload.route.enableGeo = document.getElementById('enableGeo').checked;
  payload.route.enableGfwList = document.getElementById('enableGfw').checked;

  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(function (response) {
      if (response.ok || response.status === 204) {
        fetch('/api/restart', { method: 'POST' }).catch(function () {});
        showRestartCountdown();
        return;
      }

      return response.text().then(function (text) {
        throw new Error(text);
      });
    })
    .catch(function (error) {
      showError(window.TunProxyI18n.format('Page.Config.SaveFailed', error.message));
    });
}

function copyPacUrl() {
  var url = document.getElementById('pac-url').textContent;
  navigator.clipboard.writeText(url).then(function () {
    var pacUrl = document.getElementById('pac-url');
    pacUrl.classList.add('text-success');
    window.setTimeout(function () {
      pacUrl.classList.remove('text-success');
    }, 1500);
  });
}

function applyPac() {
  fetch('/api/set-pac', { method: 'POST' })
    .then(function (response) {
      if (!response.ok) {
        throw new Error();
      }

      return response.json();
    })
    .then(function (data) {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.format('Page.Config.PacSet', data.url);
      result.className = 'small align-self-center text-success';
    })
    .catch(function () {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.t('Page.Config.PacSetFailed');
      result.className = 'small align-self-center text-danger';
    });
}

function clearPac() {
  fetch('/api/clear-pac', { method: 'POST' })
    .then(function () {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.t('Page.Config.PacCleared');
      result.className = 'small align-self-center text-muted';
    })
    .catch(function () {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.t('Page.Config.ActionFailed');
      result.className = 'small align-self-center text-danger';
    });
}

document.addEventListener('tunproxy:i18n-updated', function () {
  if (latestMode) {
    renderMode({ mode: latestMode });
  }
});

window.TunProxyI18n.initPage().then(function () {
  document.getElementById('save-button').addEventListener('click', saveConfig);
  document.getElementById('copy-pac-button').addEventListener('click', copyPacUrl);
  document.getElementById('apply-pac-button').addEventListener('click', applyPac);
  document.getElementById('clear-pac-button').addEventListener('click', clearPac);

  Promise.all([loadMode(), loadConfig()]).catch(function (error) {
    showError(window.TunProxyI18n.format('Page.Config.SaveFailed', error.message));
  });
});
</script>
</body>
</html>
