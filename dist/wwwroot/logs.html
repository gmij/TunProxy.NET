<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TunProxy</title>
  <link rel="stylesheet" href="/bootstrap/bootstrap.min.css" />
  <link rel="icon" href="/favicon.png" />
  <style>
    #log-box {
      background: #1a1a1a;
      color: #d4d4d4;
      font-family: 'Consolas', 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      height: calc(100vh - 200px);
      min-height: 300px;
      overflow-y: auto;
      padding: 10px 12px;
      border-radius: 6px;
    }

    .log-line {
      display: block;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-time  { color: #6a9955; }
    .log-INF   { color: #9cdcfe; }
    .log-WRN   { color: #dcdcaa; }
    .log-ERR   { color: #f44747; }
    .log-FTL   { color: #f44747; font-weight: bold; }
    .log-DBG   { color: #606060; }
    .log-VRB   { color: #606060; }
    .log-ex    { color: #cd5c5c; padding-left: 2em; display: block; }
    .log-hidden { display: none !important; }
    #filter-input {
      background: #2d2d2d;
      color: #d4d4d4;
      border-color: #555;
    }
    #filter-input::placeholder { color: #666; }
    #filter-input:focus {
      background: #2d2d2d;
      color: #d4d4d4;
      box-shadow: 0 0 0 .2rem rgba(100, 150, 255, .3);
      border-color: #5b9bd5;
      outline: none;
    }
    #log-empty {
      color: #666;
      font-size: 13px;
      padding: 20px 0;
    }
    #btn-bottom {
      position: fixed;
      bottom: 24px;
      right: 28px;
      z-index: 200;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      opacity: 0.7;
      transition: opacity .2s;
    }
    #btn-bottom:hover { opacity: 1; }
  </style>
</head>
<body data-page-title-key="Page.Logs.Title">
<script src="/i18n.js"></script>
<script src="/nav.js"></script>

<div class="container-fluid px-4">
  <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
    <h4 class="mb-0 me-1" data-i18n="Page.Logs.Heading"></h4>
    <button class="btn btn-sm btn-outline-secondary" id="btn-pause"></button>
    <button class="btn btn-sm btn-outline-danger" id="btn-clear" data-i18n="Page.Logs.Clear"></button>
    <div class="btn-group btn-group-sm ms-1" role="group">
      <button type="button" class="btn btn-outline-secondary" data-filter="" data-i18n="Page.Logs.FilterAll"></button>
      <button type="button" class="btn btn-outline-info" data-filter="[CONN]" data-i18n="Page.Logs.FilterConnections"></button>
      <button type="button" class="btn btn-outline-success" data-filter="[DNS ]" data-i18n="Page.Logs.FilterDns"></button>
      <button type="button" class="btn btn-outline-warning" data-filter="WRN" data-i18n="Page.Logs.FilterWarnings"></button>
      <button type="button" class="btn btn-outline-danger" data-filter="ERR" data-i18n="Page.Logs.FilterErrors"></button>
    </div>
    <input id="filter-input"
           type="text"
           class="form-control form-control-sm ms-1"
           style="max-width:220px"
           data-i18n-placeholder="Page.Logs.FilterPlaceholder" />
    <span class="text-muted small ms-auto" id="log-status"></span>
  </div>

  <div id="log-box">
    <span id="log-empty" data-i18n-html="Page.Logs.EmptyHtml"></span>
  </div>
</div>

<button id="btn-bottom" class="btn btn-secondary" data-i18n-title="Page.Logs.ScrollToLatest">↓</button>

<script>
var maxLines = 1000;
var afterId = 0;
var paused = false;
var pendingLines = [];
var filterText = '';

function levelClass(level) {
  return 'log-' + (level || 'INF');
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setPauseButtonText() {
  var pauseButton = document.getElementById('btn-pause');
  pauseButton.textContent = paused
    ? window.TunProxyI18n.t('Page.Logs.Resume')
    : window.TunProxyI18n.t('Page.Logs.Pause');
  pauseButton.className = paused ? 'btn btn-sm btn-warning' : 'btn btn-sm btn-outline-secondary';
}

function setFilter(value) {
  document.getElementById('filter-input').value = value;
  filterText = value.toLowerCase();
  applyFilterToBox();
}

function applyFilter() {
  filterText = document.getElementById('filter-input').value.toLowerCase();
  applyFilterToBox();
}

function applyFilterToBox() {
  document.querySelectorAll('#log-box .log-line').forEach(function (line) {
    var text = (line.dataset.text || '').toLowerCase();
    line.classList.toggle('log-hidden', filterText !== '' && text.indexOf(filterText) === -1);
  });
}

function togglePause() {
  paused = !paused;
  setPauseButtonText();
  if (!paused && pendingLines.length > 0) {
    appendItems(pendingLines);
    pendingLines = [];
  }
}

function clearLogs() {
  document.getElementById('log-box').innerHTML =
    '<span id="log-empty" data-i18n-html="Page.Logs.EmptyHtml">' +
    window.TunProxyI18n.t('Page.Logs.EmptyHtml') +
    '</span>';
  pendingLines = [];
}

function buildItem(entry) {
  var text = entry.time + ' [' + entry.level + '] ' + entry.message + (entry.ex ? ' ' + entry.ex : '');
  var html = '<span class="log-time">' + escapeHtml(entry.time) + '</span>' +
    ' <span class="' + levelClass(entry.level) + '">[' + escapeHtml(entry.level) + ']</span>' +
    ' ' + escapeHtml(entry.message);

  if (entry.ex) {
    html += '<span class="log-ex">' + escapeHtml(entry.ex) + '</span>';
  }

  return {
    text: text,
    html: html
  };
}

function appendItems(items) {
  var box = document.getElementById('log-box');
  var fragment = document.createDocumentFragment();
  var empty = document.getElementById('log-empty');

  if (empty) {
    empty.style.display = 'none';
  }

  items.forEach(function (item) {
    var line = document.createElement('p');
    line.className = 'log-line mb-0';
    line.dataset.text = item.text;
    line.innerHTML = item.html;
    if (filterText && item.text.toLowerCase().indexOf(filterText) === -1) {
      line.classList.add('log-hidden');
    }
    fragment.appendChild(line);
  });

  box.appendChild(fragment);

  var lines = box.querySelectorAll('.log-line');
  while (lines.length > maxLines) {
    lines[0].remove();
    lines = box.querySelectorAll('.log-line');
  }

  if (!filterText) {
    box.scrollTop = box.scrollHeight;
  }
}

function poll() {
  fetch('/api/logs?after=' + afterId)
    .then(function (response) { return response.json(); })
    .then(function (entries) {
      if (!entries || entries.length === 0) {
        return;
      }

      afterId = entries[entries.length - 1].id;
      document.getElementById('log-status').textContent =
        window.TunProxyI18n.format('Page.Logs.UpdatedAt', window.TunProxyI18n.timeString(new Date()));

      var items = entries.map(buildItem);
      if (paused) {
        pendingLines = pendingLines.concat(items);
      } else {
        appendItems(items);
      }
    })
    .catch(function () {
      document.getElementById('log-status').textContent = window.TunProxyI18n.t('Page.Logs.Reconnecting');
    });
}

function scrollToBottom() {
  var box = document.getElementById('log-box');
  box.scrollTop = box.scrollHeight;
  if (paused) {
    togglePause();
  }
}

document.addEventListener('tunproxy:i18n-updated', function () {
  setPauseButtonText();
  if (afterId === 0) {
    document.getElementById('log-status').textContent = window.TunProxyI18n.t('Page.Logs.Waiting');
  }
});

window.TunProxyI18n.initPage().then(function () {
  setPauseButtonText();
  document.getElementById('log-status').textContent = window.TunProxyI18n.t('Page.Logs.Waiting');

  document.getElementById('btn-pause').addEventListener('click', togglePause);
  document.getElementById('btn-clear').addEventListener('click', clearLogs);
  document.getElementById('btn-bottom').addEventListener('click', scrollToBottom);
  document.getElementById('filter-input').addEventListener('input', applyFilter);

  document.querySelectorAll('[data-filter]').forEach(function (button) {
    button.addEventListener('click', function () {
      setFilter(button.dataset.filter);
    });
  });

  setFilter('[CONN]');
  poll();
  window.setInterval(poll, 2000);
});
</script>
</body>
</html>
