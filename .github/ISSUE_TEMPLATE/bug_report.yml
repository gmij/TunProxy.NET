name: Bug report
description: Report reproducible broken behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Start TunProxy...
        2. Enable...
        3. Observe...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Local proxy
        - TUN
        - Tray
        - Web console
        - Service install
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove proxy credentials, private DNS data, and traffic payloads.
      render: text
