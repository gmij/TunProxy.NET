<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TunProxy</title>
  <link rel="stylesheet" href="/bootstrap/bootstrap.min.css" />
  <link rel="icon" href="/favicon.png" />
</head>
<body data-page-title-key="Page.Dns.Title">
<script src="/i18n.js"></script>
<script src="/nav.js"></script>

<div class="container-fluid px-4">
  <div id="proxy-mode-notice" class="alert alert-info" style="display:none" data-i18n-html="Page.Dns.ProxyModeNoticeHtml"></div>

  <div id="tun-content" style="display:none">
    <div class="d-flex align-items-center gap-3 mb-3">
      <h4 class="mb-0" data-i18n="Page.Dns.Heading"></h4>
      <span class="badge bg-secondary" id="dns-count">0</span>
    </div>

    <div class="mb-3 d-flex gap-2">
      <input type="text"
             class="form-control form-control-sm"
             id="search-input"
             style="max-width:300px"
             data-i18n-placeholder="Page.Dns.SearchPlaceholder" />
      <button class="btn btn-sm btn-outline-secondary" id="clear-search-button" data-i18n="Page.Dns.ClearSearch"></button>
    </div>

    <div class="d-flex flex-wrap gap-2 align-items-center small mb-2">
      <span><span class="badge bg-secondary" data-i18n="Page.Dns.RouteDirect"></span> <span data-i18n="Page.Dns.LegendDirect"></span></span>
      <span><span class="badge bg-success" data-i18n="Page.Dns.RouteProxy"></span> <span data-i18n="Page.Dns.LegendGfw"></span></span>
      <span><span class="badge bg-info text-dark" data-i18n="Page.Dns.RouteProxy"></span> <span data-i18n="Page.Dns.LegendGeo"></span></span>
      <span><span class="badge bg-warning text-dark" data-i18n="Page.Dns.RouteProxy"></span> <span data-i18n="Page.Dns.LegendDefault"></span></span>
    </div>

    <div id="dns-table-wrap" class="table-responsive mb-4">
      <table class="table table-sm table-hover">
        <thead class="table-light">
          <tr>
            <th data-i18n="Page.Dns.ResolvedDomain"></th>
            <th data-i18n="Page.Dns.IpAddress"></th>
            <th data-i18n="Page.Dns.Route"></th>
            <th data-i18n="Page.Dns.Reason"></th>
            <th>Last active</th>
            <th>Expires</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="dns-tbody"></tbody>
      </table>
      <p id="dns-empty" class="text-muted" style="display:none" data-i18n="Page.Dns.Empty"></p>
    </div>

    <hr class="my-4" />

    <div class="d-flex align-items-center gap-2 mb-2">
      <h5 class="mb-0" data-i18n="Page.Dns.DirectHeading"></h5>
      <span class="badge bg-secondary" id="direct-count">0</span>
    </div>
    <p class="text-muted small mb-2" data-i18n="Page.Dns.DirectHint"></p>
    <div id="direct-ips" class="d-flex flex-wrap gap-2 mb-3"></div>

    <p class="text-muted small mt-2" id="last-update"></p>
  </div>
</div>

<script>
var dnsRecords = [];
var latestDirectIps = [];
var isTunMode = false;

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function routeLabel(record) {
  if (record.route === 'DIRECT') {
    return window.TunProxyI18n.t('Page.Dns.RouteDirect');
  }

  if (record.route === 'PROXY') {
    return window.TunProxyI18n.t('Page.Dns.RouteProxy');
  }

  return window.TunProxyI18n.t('Page.Dns.RouteUnknown');
}

function routeBadgeClass(record) {
  if (record.route === 'DIRECT') {
    return 'bg-secondary';
  }

  if (record.reason === 'GFW') {
    return 'bg-success';
  }

  if (record.reason && record.reason.indexOf('Geo:') === 0) {
    return 'bg-info text-dark';
  }

  if (record.reason === 'Default' || record.reason === 'GeoUnknown') {
    return 'bg-warning text-dark';
  }

  if (record.route === 'PROXY') {
    return 'bg-primary';
  }

  return 'bg-light text-dark';
}

function rowClass(record) {
  if (record.route === 'DIRECT') {
    return 'table-secondary';
  }

  if (record.reason === 'GFW') {
    return 'table-success';
  }

  if (record.reason && record.reason.indexOf('Geo:') === 0) {
    return 'table-info';
  }

  if (record.reason === 'Default' || record.reason === 'GeoUnknown') {
    return 'table-warning';
  }

  return '';
}

function renderRouteBadges(record) {
  var html = '<span class="badge ' + routeBadgeClass(record) + '">' + escapeHtml(routeLabel(record)) + '</span>';

  if (record.isDnsCached) {
    html += ' <span class="badge bg-primary">DNS cache</span>';
  }

  if (record.isPrivateIp) {
    html += ' <span class="badge bg-light text-dark border">' + escapeHtml(window.TunProxyI18n.t('Page.Dns.PrivateIp')) + '</span>';
  }

  if (record.isDirectBypass) {
    html += ' <span class="badge bg-light text-dark border">' + escapeHtml(window.TunProxyI18n.t('Page.Dns.BypassRoute')) + '</span>';
  }

  return html;
}

function formatDateTime(value) {
  if (!value) {
    return '-';
  }

  var date = new Date(value);
  if (Number.isNaN(date.getTime())) {
    return '-';
  }

  return window.TunProxyI18n.timeString(date);
}

function clearDnsCache(record) {
  if (!record || !record.ipAddress) {
    return;
  }

  var url = '/api/dns-cache?ip=' + encodeURIComponent(record.ipAddress);
  if (record.hostname) {
    url += '&domain=' + encodeURIComponent(record.hostname);
  }

  fetch(url, { method: 'DELETE' })
    .then(function () { return loadData(); });
}

function filterDns() {
  var query = document.getElementById('search-input').value.toLowerCase();
  var tbody = document.getElementById('dns-tbody');
  tbody.innerHTML = '';

  var entries = dnsRecords.slice();
  if (query) {
    entries = entries.filter(function (record) {
      return String(record.ipAddress || '').toLowerCase().includes(query) ||
        String(record.hostname || '').toLowerCase().includes(query) ||
        String(record.route || '').toLowerCase().includes(query) ||
        String(record.reason || '').toLowerCase().includes(query) ||
        String(record.lastActiveUtc || '').toLowerCase().includes(query) ||
        String(record.dnsExpiresUtc || '').toLowerCase().includes(query);
    });
  }

  entries.sort(function (left, right) {
    return String(left.hostname || '').localeCompare(String(right.hostname || '')) ||
      String(left.route || '').localeCompare(String(right.route || '')) ||
      String(left.reason || '').localeCompare(String(right.reason || '')) ||
      String(left.ipAddress || '').localeCompare(String(right.ipAddress || ''));
  });

  var groups = [];
  entries.forEach(function (record) {
    var last = groups[groups.length - 1];
    var hostname = String(record.hostname || '');
    if (!last || last.hostname !== hostname) {
      last = {
        hostname: hostname,
        records: []
      };
      groups.push(last);
    }

    last.records.push(record);
  });

  groups.forEach(function (group) {
    group.records.forEach(function (record, index) {
      var row = document.createElement('tr');
      row.className = rowClass(record);
      row.innerHTML =
        (index === 0
          ? '<td rowspan="' + group.records.length + '">' + escapeHtml(group.hostname) + '</td>'
          : '') +
        '<td class="font-monospace text-nowrap">' + escapeHtml(record.ipAddress) + '</td>' +
        '<td class="text-nowrap">' + renderRouteBadges(record) + '</td>' +
        '<td class="font-monospace small">' + escapeHtml(record.reason) + '</td>' +
        '<td class="font-monospace small text-nowrap">' + escapeHtml(formatDateTime(record.lastActiveUtc)) + '</td>' +
        '<td class="font-monospace small text-nowrap">' + escapeHtml(formatDateTime(record.dnsExpiresUtc)) + '</td>' +
        '<td class="text-end">' +
          (record.isDnsCached
            ? '<button type="button" class="btn btn-sm btn-outline-danger dns-clear-button">Clear</button>'
            : '') +
        '</td>';
      var button = row.querySelector('.dns-clear-button');
      if (button) {
        button.addEventListener('click', function () {
          clearDnsCache(record);
        });
      }
      tbody.appendChild(row);
    });
  });

  document.getElementById('dns-empty').style.display = entries.length === 0 ? '' : 'none';
}

function renderDirectIps() {
  var container = document.getElementById('direct-ips');
  container.innerHTML = '';

  latestDirectIps.slice(0, 200).forEach(function (ip) {
    var badge = document.createElement('span');
    badge.className = 'badge bg-light text-dark font-monospace';
    badge.textContent = ip;
    container.appendChild(badge);
  });

  if (latestDirectIps.length > 200) {
    var more = document.createElement('span');
    more.className = 'text-muted small';
    more.textContent = window.TunProxyI18n.format('Page.Dns.MoreEntries', latestDirectIps.length - 200);
    container.appendChild(more);
  }
}

function renderPage() {
  document.getElementById('proxy-mode-notice').style.display = isTunMode ? 'none' : '';
  document.getElementById('tun-content').style.display = isTunMode ? '' : 'none';

  if (!isTunMode) {
    return;
  }

  document.getElementById('dns-count').textContent = dnsRecords.length;
  document.getElementById('direct-count').textContent = latestDirectIps.length;
  filterDns();
  renderDirectIps();
  document.getElementById('last-update').textContent =
    window.TunProxyI18n.format('Shared.RefreshAt', 10, window.TunProxyI18n.timeString(new Date()));
}

function loadData() {
  fetch('/api/status')
    .then(function (response) { return response.json(); })
    .then(function (status) {
      isTunMode = status.mode === 'tun';
      if (!isTunMode) {
        renderPage();
        return;
      }

      return Promise.all([
        fetch('/api/dns-records').then(function (response) { return response.json(); }),
        fetch('/api/direct-ips').then(function (response) { return response.json(); })
      ]).then(function (payload) {
        dnsRecords = Array.isArray(payload[0]) ? payload[0] : [];
        latestDirectIps = Array.isArray(payload[1]) ? payload[1] : [];
        renderPage();
      });
    });
}

document.addEventListener('tunproxy:i18n-updated', renderPage);

window.TunProxyI18n.initPage().then(function () {
  document.getElementById('search-input').addEventListener('input', filterDns);
  document.getElementById('clear-search-button').addEventListener('click', function () {
    document.getElementById('search-input').value = '';
    filterDns();
  });

  loadData();
  window.setInterval(loadData, 10000);
});
</script>
</body>
</html>
