name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  GEOIP_URL: https://github.com/P3TERX/GeoLite.mmdb/raw/download/GeoLite2-Country.mmdb
  GFWLIST_URL: https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt

jobs:
  validate:
    name: Validate
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      shell: pwsh
      run: |
        dotnet restore tests/TunProxy.Tests/TunProxy.Tests.csproj
        dotnet restore src/TunProxy.Tray/TunProxy.Tray.csproj
        dotnet restore src/TunProxy.Tray.macOS/TunProxy.Tray.macOS.csproj

    - name: Build CLI
      shell: pwsh
      run: dotnet build src/TunProxy.CLI/TunProxy.CLI.csproj -v minimal --no-restore

    - name: Build Windows Tray
      shell: pwsh
      run: dotnet build src/TunProxy.Tray/TunProxy.Tray.csproj -v minimal --no-restore

    - name: Build macOS Tray
      shell: pwsh
      run: dotnet build src/TunProxy.Tray.macOS/TunProxy.Tray.macOS.csproj -v minimal --no-restore

    - name: Test
      shell: pwsh
      run: dotnet test tests/TunProxy.Tests/TunProxy.Tests.csproj -v minimal --no-restore

    - name: Whitespace check
      shell: pwsh
      run: git diff --check

  # ─────────────────────────────────────────────────────────────
  # Windows  win-x64   CLI (AOT) + Tray (AOT)
  # ─────────────────────────────────────────────────────────────
  publish-windows:
    name: Publish · Windows x64
    needs: [validate]
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore (CLI + Tray)
      shell: pwsh
      run: |
        dotnet restore src/TunProxy.CLI/TunProxy.CLI.csproj
        dotnet restore src/TunProxy.Tray/TunProxy.Tray.csproj

    - name: Publish CLI (AOT)
      shell: pwsh
      run: |
        dotnet publish src/TunProxy.CLI/TunProxy.CLI.csproj `
          -c Release -r win-x64 --no-restore `
          -p:DebugType=none -p:DebugSymbols=false `
          -o dist/win-x64 --nologo

    - name: Publish Tray (AOT)
      shell: pwsh
      run: |
        dotnet publish src/TunProxy.Tray/TunProxy.Tray.csproj `
          -c Release -r win-x64 --no-restore `
          -p:DebugType=none -p:DebugSymbols=false `
          -o dist/win-x64 --nologo

    - name: Download release resources
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $d = "dist/win-x64"

        $fallbackWintun = "https://www.wintun.net/builds/wintun-0.14.1.zip"
        $wintunUri = $fallbackWintun
        try {
          $wintunPage = (Invoke-WebRequest "https://www.wintun.net/" -UseBasicParsing).Content
          $wintunMatches = [regex]::Matches(
            $wintunPage,
            '(?:https://www\.wintun\.net)?/builds/wintun-([0-9]+(?:\.[0-9]+){1,3})\.zip')
          if ($wintunMatches.Count -gt 0) {
            $wintunUri = $wintunMatches |
              ForEach-Object {
                $href = $_.Value
                if ($href.StartsWith("/")) { $href = "https://www.wintun.net$href" }
                [pscustomobject]@{ Version = [version]$_.Groups[1].Value; Uri = $href }
              } |
              Sort-Object Version -Descending |
              Select-Object -First 1 -ExpandProperty Uri
          }
        }
        catch {
          Write-Warning "Could not discover latest Wintun archive; using $fallbackWintun"
        }

        Invoke-WebRequest $wintunUri -OutFile wintun.zip -UseBasicParsing
        Expand-Archive wintun.zip -DestinationPath wintun_tmp -Force
        $dll = Get-ChildItem wintun_tmp -Filter wintun.dll -Recurse |
          Where-Object { $_.FullName -match "(\\|/)amd64(\\|/)" } |
          Select-Object -First 1
        if ($null -eq $dll) { throw "amd64 wintun.dll was not found in $wintunUri" }
        Copy-Item $dll.FullName "$d/wintun.dll" -Force

        Invoke-WebRequest $env:GEOIP_URL -OutFile "$d/GeoLite2-Country.mmdb" -UseBasicParsing
        if ((Get-Item "$d/GeoLite2-Country.mmdb").Length -lt 1024) {
          throw "GeoLite2-Country.mmdb is unexpectedly small."
        }

        Invoke-WebRequest $env:GFWLIST_URL -OutFile "$d/gfwlist.txt" -UseBasicParsing
        $decoded = [Convert]::FromBase64String((Get-Content "$d/gfwlist.txt" -Raw).Trim())
        if ($decoded.Length -eq 0) { throw "gfwlist.txt decoded to an empty payload." }

        Remove-Item wintun.zip, wintun_tmp -Recurse -Force
        Get-ChildItem "$d/wintun.dll", "$d/GeoLite2-Country.mmdb", "$d/gfwlist.txt" |
          Format-Table Name, @{L="KB";E={[int]($_.Length/1KB)}}

    - name: Assemble dist
      shell: pwsh
      run: |
        $d = "dist/win-x64"
        if (Test-Path tunproxy.json) {
          if (-not (Test-Path "$d/tunproxy.json")) { Copy-Item tunproxy.json $d/ }
        }
        Remove-Item "$d/*.pdb", "$d/*.deps.json", "$d/*.runtimeconfig.json",
          "$d/*.staticwebassets.endpoints.json", "$d/web.config" -ErrorAction SilentlyContinue
        Write-Host "=== dist/win-x64 ==="
        Get-ChildItem $d | Format-Table Name, @{L="KB";E={[int]($_.Length/1KB)}}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: TunProxy.NET-win-x64
        path: dist/win-x64

  # ─────────────────────────────────────────────────────────────
  # Linux  linux-x64   CLI (AOT built in Ubuntu 20.04 container for older glibc baseline)
  # ─────────────────────────────────────────────────────────────
  publish-linux:
    name: Publish · Linux x64
    needs: [validate]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Publish CLI (AOT, ubuntu 20.04 baseline)
      run: |
        docker run --rm \
          -v "$PWD:/work" \
          -w /work \
          ubuntu:20.04 \
          /bin/bash -lc '
            set -euo pipefail
            apt-get update -q
            DEBIAN_FRONTEND=noninteractive apt-get install -y curl ca-certificates clang zlib1g-dev
            curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
            bash /tmp/dotnet-install.sh --channel 8.0 --quality ga --install-dir /tmp/dotnet
            export DOTNET_ROOT=/tmp/dotnet
            export PATH="$DOTNET_ROOT:$PATH"
            dotnet --info
            dotnet restore src/TunProxy.CLI/TunProxy.CLI.csproj
            dotnet publish src/TunProxy.CLI/TunProxy.CLI.csproj \
              -c Release -r linux-x64 --no-restore \
              -p:DebugType=none -p:DebugSymbols=false \
              -o dist/linux-x64 --nologo
          '

    - name: Download release resources
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $d = "dist/linux-x64"
        Invoke-WebRequest $env:GEOIP_URL -OutFile "$d/GeoLite2-Country.mmdb" -UseBasicParsing
        if ((Get-Item "$d/GeoLite2-Country.mmdb").Length -lt 1024) {
          throw "GeoLite2-Country.mmdb is unexpectedly small."
        }

        Invoke-WebRequest $env:GFWLIST_URL -OutFile "$d/gfwlist.txt" -UseBasicParsing
        $decoded = [Convert]::FromBase64String((Get-Content "$d/gfwlist.txt" -Raw).Trim())
        if ($decoded.Length -eq 0) { throw "gfwlist.txt decoded to an empty payload." }

        Get-ChildItem "$d/GeoLite2-Country.mmdb", "$d/gfwlist.txt" |
          Format-Table Name, @{L="KB";E={[int]($_.Length/1KB)}}

    - name: Assemble dist
      run: |
        d=dist/linux-x64
        [ -f tunproxy.json ] && [ ! -f "$d/tunproxy.json" ] && cp tunproxy.json "$d/"
        rm -f "$d"/*.pdb "$d"/*.deps.json "$d"/*.runtimeconfig.json
        chmod +x "$d/TunProxy.CLI" 2>/dev/null || true
        echo "=== dist/linux-x64 ==="
        ls -lh "$d"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: TunProxy.NET-linux-x64
        path: dist/linux-x64

  # ─────────────────────────────────────────────────────────────
  # macOS  osx-arm64   CLI (AOT) + Tray (AOT)
  # ─────────────────────────────────────────────────────────────
  publish-macos:
    name: Publish · macOS arm64
    needs: [validate]
    runs-on: macos-latest    # macos-14 (Apple Silicon)

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Publish CLI (AOT)
      run: |
        dotnet publish src/TunProxy.CLI/TunProxy.CLI.csproj \
          -c Release -r osx-arm64 \
          -p:DebugType=none -p:DebugSymbols=false \
          -o dist/osx-arm64 --nologo

    - name: Publish macOS Tray (AOT)
      run: |
        dotnet publish src/TunProxy.Tray.macOS/TunProxy.Tray.macOS.csproj \
          -c Release -r osx-arm64 \
          -p:DebugType=none -p:DebugSymbols=false \
          -o dist/osx-arm64 --nologo

    - name: Download release resources
      shell: bash
      run: |
        set -euo pipefail
        d="dist/osx-arm64"

        curl --fail --location --retry 5 --retry-delay 3 --retry-all-errors \
          --connect-timeout 20 --max-time 180 \
          "$GEOIP_URL" -o "$d/GeoLite2-Country.mmdb"
        if [ "$(wc -c < "$d/GeoLite2-Country.mmdb")" -lt 1024 ]; then
          echo "GeoLite2-Country.mmdb is unexpectedly small." >&2
          exit 1
        fi

        curl --fail --location --retry 5 --retry-delay 3 --retry-all-errors \
          --connect-timeout 20 --max-time 180 \
          "$GFWLIST_URL" -o "$d/gfwlist.txt"
        python3 -c "import base64, pathlib; data = pathlib.Path('$d/gfwlist.txt').read_text(); decoded = base64.b64decode(''.join(data.split())); assert len(decoded) > 0"

        ls -lh "$d/GeoLite2-Country.mmdb" "$d/gfwlist.txt"

    - name: Assemble dist
      run: |
        d=dist/osx-arm64
        [ -f tunproxy.json ] && [ ! -f "$d/tunproxy.json" ] && cp tunproxy.json "$d/"
        rm -f "$d"/*.pdb "$d"/*.deps.json "$d"/*.runtimeconfig.json
        chmod +x "$d/TunProxy.CLI" "$d/TunProxy.Tray.macOS" 2>/dev/null || true
        echo "=== dist/osx-arm64 ==="
        ls -lh "$d"

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: TunProxy.NET-osx-arm64
        path: dist/osx-arm64

  # ─────────────────────────────────────────────────────────────
  # GitHub Release（仅 tag push 时执行，等三个平台都成功）
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ publish-windows, publish-linux, publish-macos ]
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Pack release archives
      run: |
        cd artifacts
        cd TunProxy.NET-win-x64
        zip -r ../../TunProxy.NET-win-x64.zip .
        cd ../TunProxy.NET-linux-x64
        tar -czf ../../TunProxy.NET-linux-x64.tar.gz .
        cd ../TunProxy.NET-osx-arm64
        tar -czf ../../TunProxy.NET-osx-arm64.tar.gz .
        cd ../..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          TunProxy.NET-win-x64.zip
          TunProxy.NET-linux-x64.tar.gz
          TunProxy.NET-osx-arm64.tar.gz
        generate_release_notes: true
