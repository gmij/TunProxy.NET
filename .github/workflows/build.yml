name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # Windows  win-x64   CLI (AOT) + Tray (AOT)
  # ─────────────────────────────────────────────────────────────
  publish-windows:
    name: Publish · Windows x64
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Download wintun.dll
      shell: pwsh
      run: |
        $zip = "wintun.zip"
        Invoke-WebRequest "https://www.wintun.net/builds/wintun-0.14.1.zip" -OutFile $zip
        Expand-Archive $zip -DestinationPath wintun_tmp -Force
        $dll = Get-ChildItem wintun_tmp -Filter wintun.dll -Recurse |
               Where-Object { $_.FullName -match "amd64" } | Select-Object -First 1
        Copy-Item $dll.FullName wintun.dll -Force
        Remove-Item $zip, wintun_tmp -Recurse -Force
        Write-Host "wintun.dll: $((Get-Item wintun.dll).Length) bytes"

    - name: Restore (CLI + Tray)
      shell: pwsh
      run: |
        dotnet restore src/TunProxy.CLI/TunProxy.CLI.csproj
        dotnet restore src/TunProxy.Tray/TunProxy.Tray.csproj

    - name: Publish CLI (AOT)
      shell: pwsh
      run: |
        dotnet publish src/TunProxy.CLI/TunProxy.CLI.csproj `
          -c Release -r win-x64 --no-restore `
          -p:DebugType=none -p:DebugSymbols=false `
          -o dist/win-x64 --nologo

    - name: Publish Tray (AOT)
      shell: pwsh
      run: |
        dotnet publish src/TunProxy.Tray/TunProxy.Tray.csproj `
          -c Release -r win-x64 --no-restore `
          -p:DebugType=none -p:DebugSymbols=false `
          -o dist/win-x64 --nologo

    - name: Assemble dist
      shell: pwsh
      run: |
        $d = "dist/win-x64"
        Copy-Item wintun.dll $d/ -Force
        if (Test-Path tunproxy.json) {
          if (-not (Test-Path "$d/tunproxy.json")) { Copy-Item tunproxy.json $d/ }
        }
        Remove-Item "$d/*.pdb", "$d/*.deps.json", "$d/*.runtimeconfig.json",
          "$d/*.staticwebassets.endpoints.json", "$d/web.config" -ErrorAction SilentlyContinue
        Write-Host "=== dist/win-x64 ==="
        Get-ChildItem $d | Format-Table Name, @{L="KB";E={[int]($_.Length/1KB)}}

    - name: Pack ZIP
      shell: pwsh
      run: Compress-Archive -Path dist/win-x64/* -DestinationPath TunProxy.NET-win-x64.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TunProxy.NET-win-x64
        path: TunProxy.NET-win-x64.zip

  # ─────────────────────────────────────────────────────────────
  # Linux  linux-x64   CLI (AOT)
  # ─────────────────────────────────────────────────────────────
  publish-linux:
    name: Publish · Linux x64
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install AOT prerequisites
      run: |
        sudo apt-get update -q
        sudo apt-get install -y clang zlib1g-dev

    - name: Restore (CLI)
      run: dotnet restore src/TunProxy.CLI/TunProxy.CLI.csproj

    - name: Publish CLI (AOT)
      run: |
        dotnet publish src/TunProxy.CLI/TunProxy.CLI.csproj \
          -c Release -r linux-x64 --no-restore \
          -p:DebugType=none -p:DebugSymbols=false \
          -o dist/linux-x64 --nologo

    - name: Assemble dist
      run: |
        d=dist/linux-x64
        [ -f tunproxy.json ] && [ ! -f "$d/tunproxy.json" ] && cp tunproxy.json "$d/"
        rm -f "$d"/*.pdb "$d"/*.deps.json "$d"/*.runtimeconfig.json
        chmod +x "$d/TunProxy.CLI" 2>/dev/null || true
        echo "=== dist/linux-x64 ==="
        ls -lh "$d"

    - name: Pack tar.gz
      run: tar -czf TunProxy.NET-linux-x64.tar.gz -C dist/linux-x64 .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TunProxy.NET-linux-x64
        path: TunProxy.NET-linux-x64.tar.gz

  # ─────────────────────────────────────────────────────────────
  # macOS  osx-arm64   CLI (AOT) + Tray (AOT, net9.0-macos)
  # ─────────────────────────────────────────────────────────────
  publish-macos:
    name: Publish · macOS arm64
    runs-on: macos-latest    # macos-14 (Apple Silicon)

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Pin SDK to 9.0 for this job
      # Prevents dotnet host from selecting SDK 10 (pre-installed on the runner),
      # which would install macOS SDK packs that require Xcode 26.3 (not available).
      run: echo '{"sdk":{"version":"9.0","rollForward":"latestPatch"}}' > global.json

    - name: Install macOS workload (net9.0-macos)
      run: |
        sudo env "PATH=$PATH" dotnet workload install macos
        sudo chown -R "$(id -un)" ~/.local/share/NuGet ~/.nuget 2>/dev/null || true

    - name: Restore CLI
      run: dotnet restore src/TunProxy.CLI/TunProxy.CLI.csproj

    - name: Publish CLI (AOT)
      run: |
        dotnet publish src/TunProxy.CLI/TunProxy.CLI.csproj \
          -c Release -r osx-arm64 --no-restore \
          -p:DebugType=none -p:DebugSymbols=false \
          -o dist/osx-arm64 --nologo

    - name: Publish macOS Tray (AOT)
      run: |
        dotnet publish src/TunProxy.Tray.macOS/TunProxy.Tray.macOS.csproj \
          -c Release -r osx-arm64 \
          -p:DebugType=none -p:DebugSymbols=false \
          -o dist/osx-arm64 --nologo

    - name: Assemble dist
      run: |
        d=dist/osx-arm64
        [ -f tunproxy.json ] && [ ! -f "$d/tunproxy.json" ] && cp tunproxy.json "$d/"
        rm -f "$d"/*.pdb "$d"/*.deps.json "$d"/*.runtimeconfig.json
        chmod +x "$d/TunProxy.CLI" "$d/TunProxy.Tray.macOS" 2>/dev/null || true
        echo "=== dist/osx-arm64 ==="
        ls -lh "$d"

    - name: Pack tar.gz
      run: tar -czf TunProxy.NET-osx-arm64.tar.gz -C dist/osx-arm64 .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TunProxy.NET-osx-arm64
        path: TunProxy.NET-osx-arm64.tar.gz

  # ─────────────────────────────────────────────────────────────
  # GitHub Release（仅 tag push 时执行，等三个平台都成功）
  # ─────────────────────────────────────────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ publish-windows, publish-linux, publish-macos ]
    runs-on: ubuntu-latest

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/TunProxy.NET-win-x64/TunProxy.NET-win-x64.zip
          artifacts/TunProxy.NET-linux-x64/TunProxy.NET-linux-x64.tar.gz
          artifacts/TunProxy.NET-osx-arm64/TunProxy.NET-osx-arm64.tar.gz
        generate_release_notes: true
