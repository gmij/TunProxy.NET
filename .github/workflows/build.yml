name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_NAME: 'TunProxy.CLI'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Download wintun.dll
      run: |
        $downloadUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
        $tempZip = "wintun.zip"
        Invoke-WebRequest -Uri $downloadUrl -OutFile $tempZip
        Expand-Archive -Path $tempZip -DestinationPath . -Force
        $dllPath = Get-ChildItem -Filter "wintun.dll" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        if ($dllPath) {
          Copy-Item $dllPath "./wintun.dll" -Force
          Write-Host "✓ wintun.dll downloaded"
        }
        Remove-Item $tempZip -Force
        Get-ChildItem -Directory | Where-Object { $_.Name -like "*wintun*" } | Remove-Item -Recurse -Force
      shell: pwsh
      
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore
      
    - name: Test
      run: dotnet test -c Release --no-build --verbosity normal --logger "console;verbosity=detailed"
      continue-on-error: false
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
          **/coverage.cobertura.xml
      
    - name: Publish AOT (win-x64)
      run: |
        dotnet publish src/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj `
          -c Release `
          -r win-x64 `
          /p:PublishAot=true `
          /p:IlcOptimizationPreference=Size `
          /p:StripSymbols=true `
          -o publish/win-x64
      shell: pwsh
      
    - name: Copy wintun.dll to publish folder
      run: Copy-Item wintun.dll publish/win-x64/ -Force
      shell: pwsh
      
    - name: Create ZIP (AOT)
      run: |
        Compress-Archive -Path publish/win-x64/* -DestinationPath TunProxy.NET-win-x64-AOT.zip -Force
      shell: pwsh
      
    - name: Publish Regular (win-x64)
      run: |
        dotnet publish src/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj `
          -c Release `
          -r win-x64 `
          --self-contained `
          -o publish/win-x64-regular
      shell: pwsh
      
    - name: Copy wintun.dll to regular publish folder
      run: Copy-Item wintun.dll publish/win-x64-regular/ -Force
      shell: pwsh
      
    - name: Create ZIP (Regular)
      run: |
        Compress-Archive -Path publish/win-x64-regular/* -DestinationPath TunProxy.NET-win-x64-regular.zip -Force
      shell: pwsh
      
    - name: Upload AOT artifact
      uses: actions/upload-artifact@v4
      with:
        name: TunProxy.NET-win-x64-AOT
        path: TunProxy.NET-win-x64-AOT.zip
        
    - name: Upload Regular artifact
      uses: actions/upload-artifact@v4
      with:
        name: TunProxy.NET-win-x64-regular
        path: TunProxy.NET-win-x64-regular.zip
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          TunProxy.NET-win-x64-AOT.zip
          TunProxy.NET-win-x64-regular.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore
      
    - name: Publish (linux-x64, no AOT)
      run: dotnet publish src/${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.csproj -c Release -r linux-x64 --self-contained -o publish/linux-x64
      
    - name: Create ZIP
      run: cd publish/linux-x64 && zip -r ../../TunProxy.NET-linux-x64.zip .
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TunProxy.NET-linux-x64
        path: TunProxy.NET-linux-x64.zip
