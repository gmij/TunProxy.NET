<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TunProxy</title>
  <link rel="stylesheet" href="/bootstrap/bootstrap.min.css" />
  <link rel="icon" href="/favicon.png" />
</head>
<body data-page-title-key="Page.Config.Title">
<script src="/i18n.js"></script>
<script src="/nav.js"></script>

<div class="container-fluid px-4">
  <div id="alert-restart" class="alert alert-warning" style="display:none"></div>
  <div id="alert-error" class="alert alert-danger" style="display:none"></div>

  <h4 class="mb-3" data-i18n="Page.Config.Title"></h4>
  <div class="d-flex flex-wrap align-items-center gap-2 small mb-3" id="config-flow">
    <span class="badge bg-secondary" id="flow-proxy"></span>
    <span class="badge bg-secondary" id="flow-resources"></span>
    <span class="badge bg-secondary" id="flow-save"></span>
  </div>
  <div class="mb-4">
    <div class="d-flex align-items-center gap-2 mb-2">
      <span class="text-muted small" data-i18n="Page.Config.CurrentMode"></span>
      <span id="mode-badge" class="badge bg-secondary" data-i18n="Shared.Loading"></span>
    </div>
    <div id="mode-hint-proxy" class="alert alert-info py-2 small mb-2" style="display:none" data-i18n-html="Page.Config.ModeHintProxyHtml"></div>
    <div id="mode-hint-tun" class="alert alert-warning py-2 small mb-2" style="display:none" data-i18n-html="Page.Config.ModeHintTunHtml"></div>
    <div id="local-port-row" class="row g-2 mb-2" style="display:none">
      <div class="col-4 col-md-2">
        <label class="form-label small text-muted" for="localPort" data-i18n="Page.Config.LocalProxyPort"></label>
        <input type="number" class="form-control form-control-sm" id="localPort" value="8080" />
      </div>
      <div class="col-auto d-flex align-items-end">
        <div class="form-check mb-0">
          <input type="checkbox" class="form-check-input" id="setSystemProxy" checked />
          <label class="form-check-label small" for="setSystemProxy" data-i18n="Page.Config.SetSystemProxy"></label>
        </div>
      </div>
    </div>
  </div>

  <h4 class="mb-3" data-i18n="Page.Config.ProxyServer"></h4>
  <div class="mb-4">
    <div class="row g-2 mb-2">
      <div class="col-8 col-md-5">
        <label class="form-label small text-muted" for="proxyHost" data-i18n="Page.Config.ProxyHost"></label>
        <input type="text" class="form-control form-control-sm" id="proxyHost" placeholder="127.0.0.1" />
      </div>
      <div class="col-4 col-md-2">
        <label class="form-label small text-muted" for="proxyPort" data-i18n="Page.Config.ProxyPort"></label>
        <input type="number" class="form-control form-control-sm" id="proxyPort" placeholder="7890" />
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label small text-muted" for="proxyType" data-i18n="Page.Config.ProxyType"></label>
        <select class="form-select form-select-sm" id="proxyType">
          <option value="Socks5">SOCKS5</option>
          <option value="Http">HTTP</option>
        </select>
      </div>
    </div>
    <div class="row g-2 mb-3">
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted" for="proxyUsername" data-i18n="Page.Config.ProxyUsername"></label>
        <input type="text" class="form-control form-control-sm" id="proxyUsername" />
      </div>
      <div class="col-6 col-md-3">
        <label class="form-label small text-muted" for="proxyPassword" data-i18n="Page.Config.ProxyPassword"></label>
        <input type="password" class="form-control form-control-sm" id="proxyPassword" />
      </div>
    </div>
    <div class="d-flex align-items-center gap-2 flex-wrap mb-2">
      <button type="button" class="btn btn-sm btn-outline-primary" id="check-proxy-button" data-i18n="Page.Config.ProxyCheck"></button>
      <span id="proxy-status-badge" class="badge bg-secondary" data-i18n="Page.Config.ProxyStatus.Unknown"></span>
      <span id="proxy-status-text" class="small text-muted" data-i18n="Page.Config.ProxyStatus.Hint"></span>
    </div>
    <div class="border rounded p-2 small" id="proxy-check-panel" style="display:none">
      <div id="proxy-check-targets" class="vstack gap-1"></div>
    </div>
  </div>

  <h4 class="mb-3" data-i18n="Page.Config.RoutingRules"></h4>
  <div class="mb-4">
    <div id="routing-locked" class="alert alert-secondary py-2 small mb-3" data-i18n="Page.Config.RoutingLocked"></div>
    <div id="routing-panel">
      <div class="alert alert-info py-2 small mb-3" data-i18n="Page.Config.SmartRoutingDescription"></div>
      <div class="row g-2 mb-3">
        <div class="col-auto">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="enableGfw" checked disabled />
            <label class="form-check-label small" for="enableGfw" data-i18n="Page.Config.EnableGfw"></label>
          </div>
        </div>
        <div class="col-auto">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="enableGeo" checked disabled />
            <label class="form-check-label small" for="enableGeo" data-i18n="Page.Config.EnableGeo"></label>
          </div>
        </div>
      </div>
      <div class="border rounded p-2 small mb-2" id="rule-resource-panel">
        <div class="d-flex align-items-center gap-2 mb-2" id="gfw-resource-row">
          <span class="fw-semibold" style="width:72px">GFW</span>
          <span class="badge bg-secondary" id="gfw-resource-status">-</span>
          <code class="text-muted flex-grow-1 text-truncate" id="gfw-resource-path"></code>
          <button type="button" class="btn btn-sm btn-outline-primary" id="gfw-resource-button" style="display:none"></button>
        </div>
        <div class="d-flex align-items-center gap-2" id="geo-resource-row">
          <span class="fw-semibold" style="width:72px">GEO</span>
          <span class="badge bg-secondary" id="geo-resource-status">-</span>
          <code class="text-muted flex-grow-1 text-truncate" id="geo-resource-path"></code>
          <button type="button" class="btn btn-sm btn-outline-primary" id="geo-resource-button" style="display:none"></button>
        </div>
      </div>
      <div class="small text-muted" data-i18n="Page.Config.DnsCacheHint"></div>
      <div class="d-flex align-items-center gap-2 flex-wrap mt-2">
        <button type="button" class="btn btn-sm btn-outline-primary" id="prepare-resources-button" style="display:none"></button>
        <span id="resource-summary-text" class="small text-muted"></span>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" id="save-button" data-i18n="Page.Config.Save"></button>
  <p class="text-muted small mt-3" data-i18n-html="Page.Config.ConfigPath"></p>

  <hr class="my-4" />

  <h4 class="mb-2" data-i18n="Page.Config.PacHeading"></h4>
  <p class="text-muted small mb-3" data-i18n-html="Page.Config.PacDescriptionHtml"></p>
  <div class="mb-3 d-flex flex-wrap align-items-center gap-2">
    <code id="pac-url" class="bg-light border rounded px-2 py-1 small">http://127.0.0.1:50000/proxy.pac</code>
    <button class="btn btn-sm btn-outline-secondary" id="copy-pac-button" data-i18n="Page.Config.CopyAddress"></button>
    <a class="btn btn-sm btn-outline-primary" href="/proxy.pac" target="_blank" data-i18n="Page.Config.PreviewPac"></a>
  </div>
  <div id="pac-win-controls" class="d-flex gap-2 flex-wrap">
    <button class="btn btn-sm btn-success" id="apply-pac-button" data-i18n="Page.Config.ApplyPac"></button>
    <button class="btn btn-sm btn-outline-danger" id="clear-pac-button" data-i18n="Page.Config.ClearPac"></button>
    <span id="pac-result" class="small align-self-center text-muted"></span>
  </div>
</div>

<script>
var cfg = {};
var latestMode = null;
var ruleResourceStatus = null;
var ruleResourceFailures = {};
var upstreamProxyStatus = null;
var routingUnlocked = false;
var checkedConfigKey = null;
var proxyChecking = false;
var resourcesPreparing = false;
var savingConfig = false;

function showError(message) {
  var error = document.getElementById('alert-error');
  error.textContent = message;
  error.style.display = '';
}

function hideError() {
  document.getElementById('alert-error').style.display = 'none';
}

function splitLines(text) {
  return text.split('\n').map(function (line) {
    return line.trim();
  }).filter(function (line) {
    return line.length > 0;
  });
}

function buildProxyConfigFromFields() {
  return {
    host: document.getElementById('proxyHost').value.trim(),
    port: parseInt(document.getElementById('proxyPort').value, 10) || 7890,
    type: document.getElementById('proxyType').value,
    username: document.getElementById('proxyUsername').value.trim() || null,
    password: document.getElementById('proxyPassword').value || null
  };
}

function buildConfigPayloadFromFields() {
  var payload = JSON.parse(JSON.stringify(cfg));
  payload.localProxy.listenPort = parseInt(document.getElementById('localPort').value, 10) || 8080;
  payload.localProxy.setSystemProxy = document.getElementById('setSystemProxy').checked;
  payload.proxy.host = document.getElementById('proxyHost').value.trim();
  payload.proxy.port = parseInt(document.getElementById('proxyPort').value, 10) || 7890;
  payload.proxy.type = document.getElementById('proxyType').value;
  payload.proxy.username = document.getElementById('proxyUsername').value.trim() || null;
  payload.proxy.password = document.getElementById('proxyPassword').value || null;
  payload.route.mode = 'smart';
  payload.route.proxyDomains = [];
  payload.route.directDomains = [];
  payload.route.enableGfwList = true;
  payload.route.enableGeo = true;
  return payload;
}

function getCurrentConfigKey() {
  return JSON.stringify(buildProxyConfigFromFields());
}

function isProxyCheckCurrent() {
  return !!(upstreamProxyStatus && upstreamProxyStatus.isAvailable && checkedConfigKey === getCurrentConfigKey());
}

function isTunMode() {
  return latestMode === 'tun';
}

function hasProxyEndpoint() {
  return document.getElementById('proxyHost').value.trim().length > 0
    && (parseInt(document.getElementById('proxyPort').value, 10) || 0) > 0;
}

function isProxyReadyForWorkflow() {
  return hasProxyEndpoint();
}

function isResourceEnabled(name) {
  return name === 'geo'
    ? document.getElementById('enableGeo').checked
    : document.getElementById('enableGfw').checked;
}

function isSingleRuleResourceReady(name) {
  if (!isResourceEnabled(name)) {
    return true;
  }

  var status = ruleResourceStatus ? ruleResourceStatus[name] : null;
  return !!(status && status.ready);
}

function areRuleResourcesReady() {
  return isSingleRuleResourceReady('geo') && isSingleRuleResourceReady('gfw');
}

function hasMissingRuleResources() {
  return !areRuleResourcesReady();
}

function setFlowBadge(id, ready, active, label) {
  var badge = document.getElementById(id);
  badge.textContent = label;
  badge.className = ready
    ? 'badge bg-success'
    : active
      ? 'badge bg-info text-dark'
      : 'badge bg-secondary';
}

function updateWorkflowControls() {
  var proxyReady = isProxyReadyForWorkflow();
  var resourcesReady = areRuleResourcesReady();
  var canPrepareResources = proxyReady && hasMissingRuleResources() && !resourcesPreparing && !savingConfig;
  var canSave = proxyReady && !resourcesPreparing && !savingConfig;
  var checkButton = document.getElementById('check-proxy-button');
  var geoButton = document.getElementById('geo-resource-button');
  var gfwButton = document.getElementById('gfw-resource-button');
  var prepareButton = document.getElementById('prepare-resources-button');
  var resourceSummary = document.getElementById('resource-summary-text');
  var saveButton = document.getElementById('save-button');

  routingUnlocked = proxyReady;
  document.getElementById('routing-panel').style.opacity = proxyReady ? '1' : '0.45';
  document.getElementById('routing-locked').style.display = proxyReady ? 'none' : '';
  checkButton.disabled = isTunMode() || proxyChecking || resourcesPreparing || savingConfig;
  geoButton.disabled = !proxyReady || resourcesPreparing || savingConfig;
  gfwButton.disabled = !proxyReady || resourcesPreparing || savingConfig;

  prepareButton.style.display = proxyReady && hasMissingRuleResources() ? '' : 'none';
  prepareButton.disabled = !canPrepareResources;
  prepareButton.textContent = resourcesPreparing
    ? window.TunProxyI18n.t('Page.Config.RuleResource.Downloading')
    : window.TunProxyI18n.t('Page.Config.RuleResource.Download') + ' GEO/GFW';

  if (!proxyReady) {
    resourceSummary.textContent = window.TunProxyI18n.t('Page.Config.RoutingLocked');
  }
  else if (resourcesReady) {
    resourceSummary.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Ready');
  }
  else if (resourcesPreparing) {
    resourceSummary.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Preparing');
  }
  else {
    resourceSummary.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Missing');
  }

  saveButton.disabled = !canSave;

  setFlowBadge(
    'flow-proxy',
    isProxyCheckCurrent(),
    proxyReady && !isProxyCheckCurrent(),
    '1 ' + window.TunProxyI18n.t('Page.Config.ProxyServer'));
  setFlowBadge(
    'flow-resources',
    resourcesReady,
    proxyReady && !resourcesReady,
    '2 ' + window.TunProxyI18n.t('Page.Config.RoutingRules'));
  setFlowBadge(
    'flow-save',
    canSave,
    proxyReady,
    '3 ' + window.TunProxyI18n.t('Page.Config.Save'));
}

function setRoutingUnlocked(unlocked) {
  routingUnlocked = unlocked;
  var panel = document.getElementById('routing-panel');
  var locked = document.getElementById('routing-locked');
  panel.style.opacity = unlocked ? '1' : '0.45';
  locked.style.display = unlocked ? 'none' : '';

  document.getElementById('geo-resource-button').disabled = !unlocked;
  document.getElementById('gfw-resource-button').disabled = !unlocked;
  renderRuleResourceStatus();
  updateWorkflowControls();
}

function resetProxyStatus() {
  upstreamProxyStatus = null;
  checkedConfigKey = null;
  var badge = document.getElementById('proxy-status-badge');
  if (isTunMode()) {
    badge.textContent = window.TunProxyI18n.t('Mode.Tun');
    badge.className = 'badge bg-warning text-dark';
    document.getElementById('proxy-status-text').textContent = window.TunProxyI18n.t('Page.Config.ModeHintTunHtml').replace(/<[^>]+>/g, ' ');
  }
  else {
    badge.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.Unknown');
    badge.className = 'badge bg-secondary';
    document.getElementById('proxy-status-text').textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.Hint');
  }
  document.getElementById('proxy-check-panel').style.display = 'none';
  setRoutingUnlocked(false);
}

function renderProxyStatus(status) {
  upstreamProxyStatus = status;
  var badge = document.getElementById('proxy-status-badge');
  var text = document.getElementById('proxy-status-text');
  var panel = document.getElementById('proxy-check-panel');
  var targets = document.getElementById('proxy-check-targets');

  targets.innerHTML = '';
  (status.targets || []).forEach(function (target) {
    var row = document.createElement('div');
    row.className = 'd-flex align-items-center gap-2';
    var targetBadge = document.createElement('span');
    targetBadge.className = target.isOk ? 'badge bg-success' : 'badge bg-danger';
    targetBadge.textContent = target.isOk ? '200' : (target.statusCode || 'ERR');
    var name = document.createElement('span');
    name.className = 'fw-semibold';
    name.style.width = '72px';
    name.textContent = target.name;
    var detail = document.createElement('span');
    detail.className = target.isOk ? 'text-muted' : 'text-danger';
    detail.textContent = target.isOk
      ? window.TunProxyI18n.format('Page.Config.ProxyStatus.TargetOk', target.elapsedMs)
      : (target.error || window.TunProxyI18n.t('Page.Config.ProxyStatus.TargetFailed'));
    row.appendChild(name);
    row.appendChild(targetBadge);
    row.appendChild(detail);
    targets.appendChild(row);
  });

  panel.style.display = '';
  if (status.isAvailable) {
    badge.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.Available');
    badge.className = 'badge bg-success';
    text.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.AvailableHint');
    setRoutingUnlocked(true);
    return;
  }

  badge.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.Unavailable');
  badge.className = 'badge bg-danger';
  text.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.UnavailableHint');
  setRoutingUnlocked(false);
}

function checkUpstreamProxy() {
  hideError();
  if (isTunMode()) {
    resetProxyStatus();
    return Promise.resolve();
  }

  var proxyConfig = buildProxyConfigFromFields();
  var requestConfigKey = JSON.stringify(proxyConfig);
  var button = document.getElementById('check-proxy-button');
  var badge = document.getElementById('proxy-status-badge');
  upstreamProxyStatus = null;
  checkedConfigKey = null;
  proxyChecking = true;
  button.disabled = true;
  button.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.Checking');
  badge.textContent = window.TunProxyI18n.t('Page.Config.ProxyStatus.Checking');
  badge.className = 'badge bg-info text-dark';
  setRoutingUnlocked(false);

  return fetch('/api/upstream-proxy/check', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(proxyConfig)
  })
    .then(function (response) {
      if (!response.ok) {
        return response.text().then(function (text) {
          throw new Error(text || response.statusText);
        });
      }

      return response.json();
    })
    .then(function (status) {
      checkedConfigKey = status.isAvailable ? requestConfigKey : null;
      renderProxyStatus(status);
    })
    .catch(function (error) {
      showError(window.TunProxyI18n.format('Page.Config.ProxyStatus.CheckFailed', error.message));
      resetProxyStatus();
    })
    .finally(function () {
      proxyChecking = false;
      button.textContent = window.TunProxyI18n.t('Page.Config.ProxyCheck');
      updateWorkflowControls();
    });
}

function renderMode(status) {
  latestMode = status.mode;
  var isTun = status.mode === 'tun';
  var badge = document.getElementById('mode-badge');

  badge.textContent = isTun
    ? window.TunProxyI18n.t('Mode.Tun')
    : window.TunProxyI18n.t('Mode.Proxy');
  badge.className = isTun ? 'badge bg-warning text-dark' : 'badge bg-info text-dark';

  document.getElementById('mode-hint-tun').style.display = isTun ? '' : 'none';
  document.getElementById('mode-hint-proxy').style.display = isTun ? 'none' : '';
  document.getElementById('local-port-row').style.display = isTun ? 'none' : '';
}

function loadMode() {
  return fetch('/api/status')
    .then(function (response) { return response.json(); })
    .then(renderMode)
    .catch(function () {
      document.getElementById('mode-badge').textContent = window.TunProxyI18n.t('Page.Config.ModeUnknown');
    });
}

function loadConfig() {
  return fetch('/api/config')
    .then(function (response) { return response.json(); })
    .then(function (config) {
      cfg = config;
      document.getElementById('localPort').value = config.localProxy.listenPort;
      document.getElementById('setSystemProxy').checked = config.localProxy.setSystemProxy;
      document.getElementById('proxyHost').value = config.proxy.host;
      document.getElementById('proxyPort').value = config.proxy.port;
      document.getElementById('proxyType').value = config.proxy.type;
      document.getElementById('proxyUsername').value = config.proxy.username || '';
      document.getElementById('proxyPassword').value = config.proxy.password || '';
      document.getElementById('enableGfw').checked = true;
      document.getElementById('enableGeo').checked = true;
      renderRuleResourceStatus();
      resetProxyStatus();
    });
}

function loadRuleResourceStatus() {
  return fetch('/api/rule-resources/status')
    .then(function (response) { return response.json(); })
    .then(function (status) {
      ruleResourceStatus = status;
      renderRuleResourceStatus();
    });
}

function renderRuleResourceStatus() {
  if (!ruleResourceStatus) {
    updateWorkflowControls();
    return;
  }

  renderSingleRuleResource(
    'geo',
    ruleResourceStatus.geo,
    document.getElementById('enableGeo').checked);
  renderSingleRuleResource(
    'gfw',
    ruleResourceStatus.gfw,
    document.getElementById('enableGfw').checked);
  updateWorkflowControls();
}

function renderSingleRuleResource(name, status, enabled) {
  var row = document.getElementById(name + '-resource-row');
  var badge = document.getElementById(name + '-resource-status');
  var path = document.getElementById(name + '-resource-path');
  var button = document.getElementById(name + '-resource-button');

  row.style.opacity = enabled ? '1' : '0.55';
  path.textContent = status && status.path ? status.path : '';

  if (!enabled) {
    badge.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Disabled');
    badge.className = 'badge bg-secondary';
    button.style.display = 'none';
    return;
  }

  if (status && status.ready) {
    badge.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Ready');
    badge.className = 'badge bg-success';
    button.style.display = 'none';
    ruleResourceFailures[name] = false;
    return;
  }

  badge.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Missing');
  badge.className = 'badge bg-warning text-dark';
  button.textContent = ruleResourceFailures[name]
    ? window.TunProxyI18n.t('Page.Config.RuleResource.Retry')
    : window.TunProxyI18n.t('Page.Config.RuleResource.Download');
  button.disabled = !routingUnlocked || resourcesPreparing || savingConfig;
  button.style.display = '';
}

function downloadRuleResource(name) {
  if (!isProxyReadyForWorkflow()) {
    showError(window.TunProxyI18n.t('Page.Config.ProxyStatus.RequiredBeforeSave'));
    return;
  }

  var button = document.getElementById(name + '-resource-button');
  var badge = document.getElementById(name + '-resource-status');
  resourcesPreparing = true;
  updateWorkflowControls();
  button.disabled = true;
  button.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Downloading');
  badge.textContent = window.TunProxyI18n.t('Page.Config.RuleResource.Downloading');
  badge.className = 'badge bg-info text-dark';

  fetch('/api/rule-resources/download?resource=' + encodeURIComponent(name), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(buildConfigPayloadFromFields())
  })
    .then(function (response) {
      if (!response.ok) {
        return response.text().then(function (text) {
          throw new Error(text || response.statusText);
        });
      }

      return response.json();
    })
    .then(function (status) {
      ruleResourceFailures[name] = false;
      ruleResourceStatus = status;
      renderRuleResourceStatus();
    })
    .catch(function (error) {
      ruleResourceFailures[name] = true;
      showError(window.TunProxyI18n.format('Page.Config.SaveFailed', error.message));
      renderRuleResourceStatus();
    })
    .finally(function () {
      resourcesPreparing = false;
      renderRuleResourceStatus();
    });
}

function prepareAllRuleResources() {
  hideError();

  if (!isProxyReadyForWorkflow()) {
    showError(window.TunProxyI18n.t('Page.Config.ProxyStatus.RequiredBeforeSave'));
    return Promise.resolve();
  }

  if (!hasMissingRuleResources()) {
    updateWorkflowControls();
    return Promise.resolve();
  }

  resourcesPreparing = true;
  ruleResourceFailures.geo = false;
  ruleResourceFailures.gfw = false;
  renderRuleResourceStatus();

  return fetch('/api/rule-resources/prepare', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(buildConfigPayloadFromFields())
  })
    .then(function (response) {
      if (response.ok) {
        return loadRuleResourceStatus();
      }

      return response.text().then(function (text) {
        throw new Error(text || response.statusText);
      });
    })
    .catch(function (error) {
      ruleResourceFailures.geo = true;
      ruleResourceFailures.gfw = true;
      showError(window.TunProxyI18n.format('Page.Config.SaveFailed', error.message));
      renderRuleResourceStatus();
    })
    .finally(function () {
      resourcesPreparing = false;
      renderRuleResourceStatus();
    });
}

function showRestartCountdown() {
  var alert = document.getElementById('alert-restart');
  var remaining = 5;

  function render() {
    alert.textContent = window.TunProxyI18n.format('Page.Config.AlertRestarting', remaining);
    alert.style.display = '';
  }

  render();
  var timer = window.setInterval(function () {
    remaining -= 1;
    if (remaining <= 0) {
      window.clearInterval(timer);
      window.location.reload();
      return;
    }

    render();
  }, 1000);
}

function saveConfig() {
  hideError();

  if (!isProxyReadyForWorkflow()) {
    showError(window.TunProxyI18n.t('Page.Config.ProxyStatus.RequiredBeforeSave'));
    return;
  }

  savingConfig = true;
  updateWorkflowControls();

  var payload = buildConfigPayloadFromFields();

  fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
    .then(function (response) {
      if (response.ok || response.status === 204) {
        fetch('/api/restart', { method: 'POST' }).catch(function () {});
        showRestartCountdown();
        return;
      }

      return response.text().then(function (text) {
        throw new Error(text);
      });
    })
    .catch(function (error) {
      savingConfig = false;
      updateWorkflowControls();
      showError(window.TunProxyI18n.format('Page.Config.SaveFailed', error.message));
    });
}

function copyPacUrl() {
  var url = document.getElementById('pac-url').textContent;
  navigator.clipboard.writeText(url).then(function () {
    var pacUrl = document.getElementById('pac-url');
    pacUrl.classList.add('text-success');
    window.setTimeout(function () {
      pacUrl.classList.remove('text-success');
    }, 1500);
  });
}

function applyPac() {
  fetch('/api/set-pac', { method: 'POST' })
    .then(function (response) {
      if (!response.ok) {
        throw new Error();
      }

      return response.json();
    })
    .then(function (data) {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.format('Page.Config.PacSet', data.url);
      result.className = 'small align-self-center text-success';
    })
    .catch(function () {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.t('Page.Config.PacSetFailed');
      result.className = 'small align-self-center text-danger';
    });
}

function clearPac() {
  fetch('/api/clear-pac', { method: 'POST' })
    .then(function () {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.t('Page.Config.PacCleared');
      result.className = 'small align-self-center text-muted';
    })
    .catch(function () {
      var result = document.getElementById('pac-result');
      result.textContent = window.TunProxyI18n.t('Page.Config.ActionFailed');
      result.className = 'small align-self-center text-danger';
    });
}

document.addEventListener('tunproxy:i18n-updated', function () {
  if (latestMode) {
    renderMode({ mode: latestMode });
  }
  if (upstreamProxyStatus) {
    renderProxyStatus(upstreamProxyStatus);
  }
  else if (isTunMode()) {
    resetProxyStatus();
  }
  renderRuleResourceStatus();
  updateWorkflowControls();
});

window.TunProxyI18n.initPage().then(function () {
  document.getElementById('save-button').addEventListener('click', saveConfig);
  document.getElementById('check-proxy-button').addEventListener('click', checkUpstreamProxy);
  document.getElementById('prepare-resources-button').addEventListener('click', prepareAllRuleResources);
  ['proxyHost', 'proxyPort', 'proxyType', 'proxyUsername', 'proxyPassword'].forEach(function (id) {
    document.getElementById(id).addEventListener('input', resetProxyStatus);
    document.getElementById(id).addEventListener('change', resetProxyStatus);
  });
  document.getElementById('geo-resource-button').addEventListener('click', function () {
    downloadRuleResource('geo');
  });
  document.getElementById('gfw-resource-button').addEventListener('click', function () {
    downloadRuleResource('gfw');
  });
  document.getElementById('copy-pac-button').addEventListener('click', copyPacUrl);
  document.getElementById('apply-pac-button').addEventListener('click', applyPac);
  document.getElementById('clear-pac-button').addEventListener('click', clearPac);

  setRoutingUnlocked(false);
  Promise.all([loadMode(), loadConfig(), loadRuleResourceStatus()])
    .then(function () {
      return isTunMode() ? resetProxyStatus() : checkUpstreamProxy();
    })
    .catch(function (error) {
    showError(window.TunProxyI18n.format('Page.Config.SaveFailed', error.message));
  });
});
</script>
</body>
</html>
